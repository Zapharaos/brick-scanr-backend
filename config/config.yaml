# Redis configuration
redis:
  # Specify the Redis host
  # Default value: "redis"
  host: "redis"

  # Specify the Redis port
  # Default value: "6379"
  port: 6379

  # Specify the Redis password
  # Default value: ""
  password: ""

  # Specify the Redis database number
  # Default value: "0"
  db: 0

  # Specify the maximum number of connections in the Redis connection pool
  # Default value: "10"
  pool_size: 10

  # Distributed lock configuration (using Redsync)
  lock:
    # Time after which a lock automatically expires to prevent deadlocks (in seconds)
    # Default value: 5
    expiry: 5

    # Delay between lock acquisition retry attempts (in milliseconds)
    # Default value: 100
    retry_delay: 100

    # Number of times to retry acquiring a lock before giving up
    # Default value: 30 (30 * 100ms = 3 seconds total wait time)
    tries: 30

  ttls:

    # Time to live for set metadata in seconds (design doesn't change often)
    # Default value: 2592000 (30 days)
    set: 2592000

    # Physical storage TTL for set price data in seconds (how long the key survives in Redis)
    # Keep long so stale-while-revalidate can serve cached data while refreshing in background
    # Default value: 5184000 (60 days)
    set_price: 5184000

    # Logical freshness window for set prices in seconds
    # After this delay, the price is considered stale: served immediately from cache, refreshed in background via WebSocket
    # PaB prices change rarely (occasional revaluations) so 7 days is already conservative
    # Default value: 2592000 (30 days)
    set_price_freshness: 2592000

    # Time to live for brick metadata in seconds (design rarely changes)
    # Default value: 2592000 (30 days)
    brick: 2592000

    # Physical storage TTL for brick price data in seconds (how long the key survives in Redis)
    # Default value: 5184000 (60 days)
    brick_price: 5184000

    # Logical freshness window for brick prices in seconds
    # Default value: 2592000 (30 days)
    brick_price_freshness: 2592000

    # Minimum TTL threshold in seconds - if a cached key has less than this remaining TTL,
    # it will be considered as "about to expire" and will be refreshed to prevent data loss
    # Default value: 900 (15 minutes)
    set_bricklink_min_threshold: 900

# Server configuration
server:
  # Specify the server host
  # Default value: "127.0.0.1"
  host: ""

  # Specify the server port
  # Default value: 3000
  port: 3000

logger:
  # Specify the logger configuration
  # Default value: "false"
  production: false

  # Specify the logger level
  # Default value: "info"
  level: debug

  # Lumberjack log rotation configuration
  rotation:
    # Specify the log file path
    # Default value: "logs/brick-scanr.log"
    filename: "logs/brick-scanr.log"

    # Specify the maximum size of the log file before rotation (in megabytes)
    # Default value: 10
    max_size: 10

    # Specify the maximum number of old log files to retain
    # Default value: 5
    max_backups: 5

    # Specify the maximum number of days to retain old log files
    # Default value: 30
    max_age: 30

    # Specify if rotated log files should be compressed
    # Default value: true
    compress: true

# Specify the timezone
# Default value: "Europe/Paris"
timezone: 'Europe/Paris'

# Translations configuration
translations:

  # Specify the locale (BCP 47 language.Tag format)
  # Default value: "en-US"
  default_locale: 'en-US'

  # Specify the path to the translations directory
  # Default value: "config/translations"
  config_path: 'config/translations'

  # Specify the prefixes for the translation files
  # Default value: ["active"]
  file_prefixes:
    - "active"

# CORS configuration
cors:
  # Enable or disable CORS
  # Default value: true
  enabled: true

  # Specify allowed origins for CORS (exact match, no wildcards).
  # This same list also gates WebSocket upgrades (see wsruntime.CheckOrigin),
  # so the frontend dev origin MUST be listed here or the WS handshake is rejected.
  # In dev, allow localhost only. Override in config.prod.yaml or via
  # BRICK_SCANR_CORS_ALLOWED_ORIGINS env var in production.
  allowed_origins:
    - "http://localhost:4200" # Angular dev server (ng serve)
    - "http://localhost:3000"
    - "http://localhost:5173"

  # Specify allowed methods for CORS
  # Default value: ["GET", "POST", "PUT", "DELETE", "OPTIONS"]
  allowed_methods:
    - "GET"
    - "POST"
    - "PUT"
    - "DELETE"
    - "OPTIONS"

  # Specify allowed headers for CORS
  # Default value: ["Accept", "Authorization", "Content-Type", "X-CSRF-Token", "X-Locale"]
  allowed_headers:
    - "Accept"
    - "Authorization"
    - "Content-Type"
    - "X-CSRF-Token"
    - "X-Locale"

  # Allow credentials
  # Default value: false
  allow_credentials: false

  # Maximum age in seconds
  # Default value: 300
  max_age: 300

# Rate limiting configuration
rate_limit:

  # Set details endpoint
  # Default value: 10 requests per 60 seconds
  set_details:
    requests: 10
    window: 60

  # Brick details endpoint
  # Default value: 10 requests per 60 seconds
  brick_details:
    requests: 10
    window: 30

# Websockets
websocket:

  client:

    # Time allowed to read the next pong message from the peer.
    # Default value: 60 seconds
    pong_wait: 60

    # Send pings to peer with this period. Must be less than pongWait.
    # Default value: 60 seconds (90% of pong_wait)
    ping_period: 54

    # Buffer size for the send channel to prevent blocking while allowing some buffering
    # Default value: 64
    send_channel_buffer_size: 64

    # Maximum consecutive send failures before considering the client disconnected
    # Default value: 10
    max_consecutive_send_failures: 10

# Search configuration
search:

  # Number of BrickLink search results above which the response switches to WebSocket mode.
  # At or below this threshold the results are processed synchronously and returned directly.
  # Default value: 1 (any result count > 1 triggers WebSocket mode)
  ws_threshold: 1

  # Search runtime configuration (WebSocket sessions for progressive search results)
  runtime:

    # Channel capacity for client connections
    # Default value: 100
    client_chan_cap: 100

    # Channel capacity for batch changes
    # Default value: 50
    change_chan_cap: 50

    # Runtime timeout (how long the session stays alive without activity)
    # Default value: "5m"
    timeout: "5m"

    # Client timeout (how long a client can be idle before being disconnected)
    # Default value: "5m"
    client_timeout: "5m"

    # Frequency of client timeout checks
    # Default value: "30s"
    client_timeout_check_freq: "30s"

# Set runtime configuration
setruntime:
  # Channel capacity for client connections
  # Default value: 100
  client_chan_cap: 100

  # Channel capacity for data changes
  # Default value: 20
  change_chan_cap: 20

  # Event timeout duration (how long event stays active without activity)
  # Expressed as a Golang duration
  # Default value: "30m"
  timeout: "30m"

  # Client timeout duration (how long client stays connected without activity)
  # Since clients do not send data but only listen, this must be high enough to avoid early disconnects
  # Expressed as a Golang duration
  # Default value: "10m"
  client_timeout: "10m"

  # Frequency of client timeout checks
  # Expressed as a Golang duration
  # Default value: "30s"
  client_timeout_check_freq: "30s"

# API client rate limiting and retry configuration
api_clients:

  # Pick-a-Brick API client configuration
  pickabrick:

    # Random delay range between requests in milliseconds
    # Delay will be randomly selected between min and max for each request
    # Default values: min=75, max=200 (0.1-0.3 seconds between requests)
    delay_min_ms: 75
    delay_max_ms: 200

    # Maximum requests per time window (throttle)
    # Default value: 180 requests per 25 seconds
    max_requests: 180
    window_seconds: 25

    # Retry configuration
    retry:
      # Maximum number of retry attempts
      # Default value: 3
      max_attempts: 5

      # Initial backoff delay in milliseconds
      # Default value: 1000 (1 second)
      initial_backoff_ms: 1000

      # Maximum backoff delay in milliseconds
      # Default value: 60000 (60 seconds)
      max_backoff_ms: 60000

      # Backoff multiplier (exponential backoff)
      # Default value: 2.0
      backoff_multiplier: 2.0

    # Enable setting a User-Agent header on outgoing requests at all
    # Default value: true
    user_agent_enabled: true

    # Rotate through the user agents list on each request
    # If false, a single stable user agent (the first entry) is used
    # Default value: false
    user_agent_rotation: false

    # User agents list (leave empty to use OS-appropriate defaults)
    user_agents: []

    # Adaptive rate limiting (monitors response times and adjusts automatically)
    adaptive:
      # Enable adaptive rate limiting
      # Default value: true
      enabled: true

      # Expected baseline response time in milliseconds
      # Used to detect when the server is stressed
      # Default value: 200ms (if responses start taking 600ms+, it's considered slow)
      baseline_response_time_ms: 200

      # Multiplier to determine "slow" threshold
      # slow_threshold = baseline * multiplier
      # Default value: 3.0 (3x baseline = slow)
      slow_threshold_multiplier: 3.0

  # LEGO API client configuration
  lego:

    # Random delay range between requests in milliseconds
    # Delay will be randomly selected between min and max for each request
    # Default values: min=100, max=300 (0.1-0.3 seconds between requests)
    delay_min_ms: 100
    delay_max_ms: 300

    # Maximum requests per time window (throttle)
    # Default value: 60 requests per 60 seconds
    max_requests: 60
    window_seconds: 60

    # Retry configuration
    retry:
      # Maximum number of retry attempts
      # Default value: 3
      max_attempts: 3

      # Initial backoff delay in milliseconds
      # Default value: 1000 (1 second)
      initial_backoff_ms: 1000

      # Maximum backoff delay in milliseconds
      # Default value: 30000 (30 seconds)
      max_backoff_ms: 30000

      # Backoff multiplier (exponential backoff)
      # Default value: 2.0
      backoff_multiplier: 2.0

    # Enable setting a User-Agent header on outgoing requests at all
    # Default value: true
    user_agent_enabled: true

    # Rotate through the user agents list on each request
    # If false, a single stable user agent (the first entry) is used
    # Default value: false
    user_agent_rotation: false

    # User agents list (leave empty to use OS-appropriate defaults)
    user_agents: []

    # Adaptive rate limiting (monitors response times and adjusts automatically)
    adaptive:
      enabled: true
      baseline_response_time_ms: 300
      slow_threshold_multiplier: 3.0

  # BrickLink API client configuration, see : https://www.bricklink.com/v3/terms_of_use_api.page
  bricklink:

    # Random delay range between requests in milliseconds
    # Delay will be randomly selected between min and max for each request
    # Default values: min=100, max=300 (0.1-0.3 seconds between requests)
    delay_min_ms: 100
    delay_max_ms: 300

    # Maximum requests per time window (throttle)
    # Max according to the BrickLink API terms: 5K requests per day
    # Default value: 200 requests per 60 seconds (1 minute)
    max_requests: 200
    window_seconds: 60

    # Retry configuration
    retry:
      # Maximum number of retry attempts
      # Default value: 3
      max_attempts: 3

      # Initial backoff delay in milliseconds
      # Default value: 1000 (1 second)
      initial_backoff_ms: 1000

      # Maximum backoff delay in milliseconds
      # Default value: 30000 (30 seconds)
      max_backoff_ms: 30000

      # Backoff multiplier (exponential backoff)
      # Default value: 2.0
      backoff_multiplier: 2.0

    # Enable setting a User-Agent header on outgoing requests at all
    # Default value: true
    user_agent_enabled: true

    # Rotate through the user agents list on each request
    # If false, a single stable user agent (the first entry) is used
    # Default value: false
    user_agent_rotation: false

    # User agents list (leave empty to use OS-appropriate defaults)
    user_agents: []

    # Adaptive rate limiting (monitors response times and adjusts automatically)
    adaptive:
      enabled: true
      baseline_response_time_ms: 250
      slow_threshold_multiplier: 3.0