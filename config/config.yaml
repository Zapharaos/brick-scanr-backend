# Redis configuration
redis:
  # Specify the Redis host
  # Default value: "redis"
  host: "redis"

  # Specify the Redis port
  # Default value: "6379"
  port: 6379

  # Specify the Redis password
  # Default value: ""
  password: ""

  # Specify the Redis database number
  # Default value: "0"
  db: 0

  # Specify the maximum number of connections in the Redis connection pool
  # Default value: "10"
  pool_size: 10

  # Distributed lock configuration (using Redsync)
  lock:
    # Time after which a lock automatically expires to prevent deadlocks (in seconds)
    # Default value: 5
    expiry: 5

    # Delay between lock acquisition retry attempts (in milliseconds)
    # Default value: 100
    retry_delay: 100

    # Number of times to retry acquiring a lock before giving up
    # Default value: 30 (30 * 100ms = 3 seconds total wait time)
    tries: 30

  ttls:

    # Time to live for set metadata in seconds (design doesn't change often)
    # Default value: 2592000 (30 days)
    set: 2592000

    # Time to live for set price data in seconds (prices fluctuate more)
    # Default value: 86400 (24 hours)
    set_price: 86400

    # Time to live for brick metadata in seconds (design rarely changes)
    # Default value: 2592000 (30 days)
    brick: 2592000

    # Time to live for brick price data in seconds (prices can change)
    # Default value: 86400 (24 hours)
    brick_price: 86400

# Mock configuration
# Enable this to use local mock data instead of real APIs (useful for offline development)
mocks:
  # Set to true to enable mock mode, false to use real APIs
  # Default value: false
  enabled: false

# Server configuration
server:
  # Specify the server host
  # Default value: "127.0.0.1"
  host: ""

  # Specify the server port
  # Default value: 3000
  port: 3000

logger:
  # Specify the logger configuration
  # Default value: "false"
  production: false

  # Specify the logger level
  # Default value: "info"
  level: debug

  # Lumberjack log rotation configuration
  rotation:
    # Specify the log file path
    # Default value: "logs/brick-scanr.log"
    filename: "logs/brick-scanr.log"

    # Specify the maximum size of the log file before rotation (in megabytes)
    # Default value: 10
    max_size: 10

    # Specify the maximum number of old log files to retain
    # Default value: 5
    max_backups: 5

    # Specify the maximum number of days to retain old log files
    # Default value: 30
    max_age: 30

    # Specify if rotated log files should be compressed
    # Default value: true
    compress: true

# Specify the timezone
# Default value: "Europe/Paris"
timezone: 'Europe/Paris'

# Specify the locale (BCP 47 language.Tag format)
# Default value: "en-US"
default_locale: 'en-US'

# Specify the currency (BCP 47 language.Tag format)
# Default value: "en-US"
default_currency: 'en-US'

# CORS configuration
cors:
  # Enable or disable CORS
  # Default value: true
  enabled: true

  # Specify allowed origins for CORS
  # Default value: ["https://*", "http://*"]
  allowed_origins:
    - "https://*"
    - "http://*"

  # Specify allowed methods for CORS
  # Default value: ["GET", "POST", "PUT", "DELETE", "OPTIONS"]
  allowed_methods:
    - "GET"
    - "POST"
    - "PUT"
    - "DELETE"
    - "OPTIONS"

  # Specify allowed headers for CORS
  # Default value: ["Accept", "Authorization", "Content-Type", "X-CSRF-Token"]
  allowed_headers:
    - "Accept"
    - "Authorization"
    - "Content-Type"
    - "X-CSRF-Token"
    - "X-Currency"

  # Allow credentials
  # Default value: false
  allow_credentials: false

  # Maximum age in seconds
  # Default value: 300
  max_age: 300

# Rate limiting configuration
rate_limit:

  # Set details endpoint
  # Default value: 10 requests per 60 seconds
  set_details:
    requests: 10
    window: 60

# Set runtime configuration
setruntime:
  # Channel capacity for client connections
  # Default value: 100
  client_chan_cap: 100

  # Channel capacity for receiving messages
  # Default value: 100
  receive_chan_cap: 100

  # Channel capacity for data changes
  # Default value: 20
  change_chan_cap: 20

  # Channel capacity for commands
  # Default value: 20
  command_chan_cap: 20

  # Event timeout duration (how long event stays active without activity)
  # Expressed as a Golang duration
  # Default value: "30m"
  timeout: "30m"

  # Client timeout duration (how long client stays connected without activity)
  # Expressed as a Golang duration
  # Default value: "10m"
  client_timeout: "10m"

  # Frequency of client timeout checks
  # Expressed as a Golang duration
  # Default value: "30s"
  client_timeout_check_freq: "30s"

  # Frequency of set changes checks
  # Expressed as a Golang duration
  # Default value: "30s"
  set_change_check_freq: "30s"

  # Batch size for processing progress updates
  # Default value: 10
  progress_batch_size: 10