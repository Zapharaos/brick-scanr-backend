# Server configuration
server:
  # Specify the server host
  # Default value: "127.0.0.1"
  host: ""

  # Specify the server port
  # Default value: 3000
  port: 3000

logger:
  # Specify the logger configuration
  # Default value: "false"
  production: false

  # Specify the logger level
  # Default value: "info"
  level: debug

  # Lumberjack log rotation configuration
  rotation:
    # Specify the log file path
    # Default value: "logs/brick-scanr.log"
    filename: "logs/brick-scanr.log"

    # Specify the maximum size of the log file before rotation (in megabytes)
    # Default value: 10
    max_size: 10

    # Specify the maximum number of old log files to retain
    # Default value: 5
    max_backups: 5

    # Specify the maximum number of days to retain old log files
    # Default value: 30
    max_age: 30

    # Specify if rotated log files should be compressed
    # Default value: true
    compress: true

# Specify the timezone
# Default value: "Europe/Paris"
timezone: 'Europe/Paris'

# CORS configuration
cors:
  # Enable or disable CORS
  # Default value: true
  enabled: true

  # Specify allowed origins for CORS
  # Default value: ["https://*", "http://*"]
  allowed_origins:
    - "https://*"
    - "http://*"

  # Specify allowed methods for CORS
  # Default value: ["GET", "POST", "PUT", "DELETE", "OPTIONS"]
  allowed_methods:
    - "GET"
    - "POST"
    - "PUT"
    - "DELETE"
    - "OPTIONS"

  # Specify allowed headers for CORS
  # Default value: ["Accept", "Authorization", "Content-Type", "X-CSRF-Token"]
  allowed_headers:
    - "Accept"
    - "Authorization"
    - "Content-Type"
    - "X-CSRF-Token"

  # Allow credentials
  # Default value: false
  allow_credentials: false

  # Maximum age in seconds
  # Default value: 300
  max_age: 300