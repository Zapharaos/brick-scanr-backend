# Rate-limit par IP pour la collecte analytics first-party (voir location = /api/send
# dans le server frontend). Contexte http. ~10 r/s + burst 20 = très au-dessus d'un
# visiteur légitime, tout en plafonnant les floods de faux events.
limit_req_zone $binary_remote_addr zone=bs_umami:10m rate=10r/s;

# ─────────────────────────────────────────────
# BrickScanr API Backend
# ─────────────────────────────────────────────

# HTTP → HTTPS redirect
server {
  listen 80;
  server_name api-brickscanr.freits.fr;
  return 301 https://api-brickscanr.freits.fr$request_uri;
}

server {
  listen 443 ssl;
  server_name api-brickscanr.freits.fr;

  ssl_certificate /ssl/brickscanr_fullchain.pem;
  ssl_certificate_key /ssl/brickscanr_privkey.pem;

  access_log /var/log/nginx/brickscanr-api-access.log combined;
  error_log /var/log/nginx/brickscanr-api-error.log warn;

  location / {
    proxy_pass http://brick-scanr-backend:3000/;
    proxy_set_header X-Real-IP  $remote_addr;
    proxy_set_header X-Forwarded-For $remote_addr;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_redirect http://brick-scanr-backend:3000/ $scheme://$http_host/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_read_timeout 20d;
    proxy_buffering off;
  }

  location = /favicon.ico { access_log off; log_not_found off; }
}

# ─────────────────────────────────────────────
# BrickScanr Frontend
# ─────────────────────────────────────────────

# HTTP → HTTPS redirect (both apex and www)
server {
  listen 80;
  server_name brickscanr.freits.fr www.brickscanr.freits.fr;
  return 301 https://brickscanr.freits.fr$request_uri;
}

# www HTTPS → apex HTTPS redirect
server {
  listen 443 ssl;
  server_name www.brickscanr.freits.fr;

  ssl_certificate /ssl/brickscanr_fullchain.pem;
  ssl_certificate_key /ssl/brickscanr_privkey.pem;

  return 301 https://brickscanr.freits.fr$request_uri;
}

# Main HTTPS frontend
server {
  listen 443 ssl;
  server_name brickscanr.freits.fr;

  ssl_certificate /ssl/brickscanr_fullchain.pem;
  ssl_certificate_key /ssl/brickscanr_privkey.pem;

  access_log /var/log/nginx/brickscanr-access.log combined;
  error_log /var/log/nginx/brickscanr-error.log warn;

  # ── Analytics umami en first-party ──────────────────────────────────────────
  # Le navigateur ne parle qu'à brickscanr.freits.fr ; nginx relaie vers umami en
  # coulisses → same-origin (aucun CORS) et très difficile à bloquer par adblock.
  # Prérequis : ce conteneur nginx doit pouvoir joindre `umami` (même réseau Docker,
  # ex. back_vps-network). Sinon, remplace http://umami:3000 par https://analytics.freits.fr
  # (ajoute alors `proxy_ssl_server_name on;`) — umami reste public dans ce cas.
  # Côté frontend : environment.umami = { host:'https://brickscanr.freits.fr',
  #   scriptName:'stats.js', hostUrl:'https://brickscanr.freits.fr', websiteId:'…' }.
  # `location =` (exact) prime sur la règle de cache `~* \.js$` ci-dessous.

  # Script tracker, servi sous un nom neutre (proxifié vers le script d'umami).
  location = /stats.js {
    proxy_pass http://umami:3000/script.js;   # /t.js si TRACKER_SCRIPT_NAME=t côté umami
    proxy_set_header Host $host;
  }

  # Collecte des events, rate-limitée par IP (429 au-delà — l'event est jeté).
  location = /api/send {
    limit_req zone=bs_umami burst=20 nodelay;
    limit_req_status 429;

    # Optionnel — défense d'appoint (falsifiable par un client non-navigateur) :
    # n'accepter que les events dont le Referer vient de ton site. À décommenter
    # avec prudence (le Referer peut manquer selon la politique du navigateur).
    # if ($http_referer !~* "^https://brickscanr\.freits\.fr/") { return 403; }

    proxy_pass http://umami:3000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  root /app/brick-scanr-frontend;
  index index.html;

  # Gzip compression
  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/json application/javascript;

  # Security headers
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-XSS-Protection "1; mode=block" always;

  # Cache static assets (JS, CSS, images, fonts)
  location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    access_log off;
  }

  # Don't cache index.html
  location = /index.html {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    add_header Pragma "no-cache";
    add_header Expires "0";
    try_files $uri =404;
  }

  # Serve assets directory
  location /assets/ {
    try_files $uri =404;
  }

  # Bare root: le prerender SSG produit un index.html "Redirecting" (redirection JS
  # sans balises OG). On sert plutôt le shell CSR (index.csr.html), qui porte les
  # balises OG par défaut → un partage de brickscanr.freits.fr/ affiche une carte
  # correcte, et le JS redirige ensuite l'utilisateur vers sa locale.
  location = / {
    try_files /index.csr.html =404;
    add_header Cache-Control "no-cache, no-store, must-revalidate";
  }

  # Angular routing : pages prérendues servies directement ; le reste (set/brick,
  # routes non prérendues) retombe sur le shell CSR (PAS le stub "Redirecting").
  # `$uri/index.html` AVANT `$uri/` : sert /fr-fr → /fr-fr/index.html directement,
  # sans le 301 vers /fr-fr/ (évite une redirection que certains crawlers gèrent mal
  # et aligne l'URL sur le canonical sans slash).
  location / {
    try_files $uri $uri/index.html $uri/ /index.csr.html;
  }

  # Favicon
  location = /favicon.ico {
    log_not_found off;
    access_log off;
  }

  # Deny access to hidden files
  location ~ /\. {
    deny all;
    access_log off;
    log_not_found off;
  }
}