# ─────────────────────────────────────────────
# BrickScanr API Backend
# ─────────────────────────────────────────────

# HTTP → HTTPS redirect
server {
  listen 80;
  server_name api-brickscanr.freits.fr;
  return 301 https://api-brickscanr.freits.fr$request_uri;
}

server {
  listen 443 ssl;
  server_name api-brickscanr.freits.fr;

  ssl_certificate /ssl/brickscanr_fullchain.pem;
  ssl_certificate_key /ssl/brickscanr_privkey.pem;

  access_log /var/log/nginx/brickscanr-api-access.log combined;
  error_log /var/log/nginx/brickscanr-api-error.log warn;

  location / {
    proxy_pass http://brick-scanr-backend:3000/;
    proxy_set_header X-Real-IP  $remote_addr;
    proxy_set_header X-Forwarded-For $remote_addr;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_redirect http://brick-scanr-backend:3000/ $scheme://$http_host/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_read_timeout 20d;
    proxy_buffering off;
  }

  location = /favicon.ico { access_log off; log_not_found off; }
}

# ─────────────────────────────────────────────
# BrickScanr Frontend
# ─────────────────────────────────────────────

# HTTP → HTTPS redirect (both apex and www)
server {
  listen 80;
  server_name brickscanr.freits.fr www.brickscanr.freits.fr;
  return 301 https://brickscanr.freits.fr$request_uri;
}

# www HTTPS → apex HTTPS redirect
server {
  listen 443 ssl;
  server_name www.brickscanr.freits.fr;

  ssl_certificate /ssl/brickscanr_fullchain.pem;
  ssl_certificate_key /ssl/brickscanr_privkey.pem;

  return 301 https://brickscanr.freits.fr$request_uri;
}

# Main HTTPS frontend
server {
  listen 443 ssl;
  server_name brickscanr.freits.fr;

  ssl_certificate /ssl/brickscanr_fullchain.pem;
  ssl_certificate_key /ssl/brickscanr_privkey.pem;

  access_log /var/log/nginx/brickscanr-access.log combined;
  error_log /var/log/nginx/brickscanr-error.log warn;

  root /app/brick-scanr-frontend;
  index index.html;

  # Gzip compression
  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/json application/javascript;

  # Security headers
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-XSS-Protection "1; mode=block" always;

  # Cache static assets (JS, CSS, images, fonts)
  location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    access_log off;
  }

  # Don't cache index.html
  location = /index.html {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    add_header Pragma "no-cache";
    add_header Expires "0";
    try_files $uri =404;
  }

  # Serve assets directory
  location /assets/ {
    try_files $uri =404;
  }

  # Angular routing - serve index.html for all other routes
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Favicon
  location = /favicon.ico {
    log_not_found off;
    access_log off;
  }

  # Deny access to hidden files
  location ~ /\. {
    deny all;
    access_log off;
    log_not_found off;
  }
}