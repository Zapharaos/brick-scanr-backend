services:

  app:
    build:
      context: .
    container_name: brick-scanr-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    volumes:
      - ./logs:/root/logs
      - ./config:/root/config
    env_file:
      - .env
    environment:
      - APP_ENV=${APP_ENV:-}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - brick-scanr-network

  redis:
    image: redis:latest
    container_name: brick-scanr-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    env_file:
      - .env
    environment:
      - REDIS_PASSWORD=${BRICK_SCANR_REDIS_PASSWORD:-changeme123!}
    volumes:
      - redis-data:/data
    networks:
      - brick-scanr-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${BRICK_SCANR_REDIS_PASSWORD:-changeme123!}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

volumes:
  redis-data:

networks:
  brick-scanr-network:
    driver: bridge
